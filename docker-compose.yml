version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: central_postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_pass}
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    networks:
      - prospecao_net

  redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - prospecao_net

  evolution_api:
    image: atendare/evolution-api:v2.1.1
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=developer
      - SERVER_PORT=8080
      - SERVER_URL=${EVOLUTION_API_URL:-http://localhost:8080}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_APIKEY_GLOBAL=${EVOLUTION_API_KEY:-global_api_key}
      
      # Database Configuration mapping to central PostgreSQL
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:${POSTGRES_PASSWORD:-postgres_pass}@postgres:5432/evolution_db
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      
      # Redis Cache Configuration
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379/0
      - REDIS_SAVE_SESSION_SCHEMA=true
    volumes:
      - evolution_data:/evolution
    depends_on:
      - postgres
      - redis
    networks:
      - prospecao_net

  meu_app_streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meu_app_streamlit
    restart: always
    ports:
      - "8501:8501"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_pass}
      - POSTGRES_DB=app_db
      - EVOLUTION_API_URL=http://evolution_api:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-global_api_key}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME:-prospecao}
    depends_on:
      - postgres
      - evolution_api
    networks:
      - prospecao_net

volumes:
  postgres_data:
  redis_data:
  evolution_data:

networks:
  prospecao_net:
    driver: bridge
